name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  packages: write

env:
  IMAGE_TAG: ${{ github.sha }}
  DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER || secrets.DOCKERHUB_USERNAME || 'rick0x00' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install hadolint
        run: |
          curl -fsSL https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64 -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run lint wrapper
        run: bash ci/scripts/lint.sh

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        run: bash ci/scripts/build.sh
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          DOCKERHUB_USER: ${{ env.DOCKERHUB_USER }}

  push:
    name: Push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build + push image
        run: bash ci/scripts/push.sh
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME || vars.DOCKERHUB_USER || 'rick0x00' }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          ENABLE_GHCR_PUSH: "1"
          GHCR_USER: ${{ github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy
    runs-on: [self-hosted, local]
    needs: push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    env:
      ENV: dev
      KUBE_CONTEXT: default
      IMAGE_TAG: ${{ env.IMAGE_TAG }}
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME || vars.DOCKERHUB_USER || 'rick0x00' }}
      KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
      GCP_SA_KEY_B64: ${{ secrets.GCP_SA_KEY_B64 }}
    steps:
      - uses: actions/checkout@v4

      - name: Install deploy tools only if missing
        run: |
          set -euo pipefail

          if ! command -v task >/dev/null 2>&1; then
            sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin
          fi

          if ! command -v kubectl >/dev/null 2>&1; then
            curl -fsSL "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl" -o /usr/local/bin/kubectl
            chmod +x /usr/local/bin/kubectl
          fi

          if ! command -v helmfile >/dev/null 2>&1; then
            curl -fsSL https://github.com/helmfile/helmfile/releases/download/v0.167.1/helmfile_0.167.1_linux_amd64.tar.gz -o /tmp/helmfile.tar.gz
            tar -xzf /tmp/helmfile.tar.gz -C /usr/local/bin helmfile
          fi

          if ! command -v sops >/dev/null 2>&1; then
            curl -fsSL https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64 -o /usr/local/bin/sops
            chmod +x /usr/local/bin/sops
          fi

      - name: Deploy wrapper
        run: bash ci/scripts/deploy.sh
