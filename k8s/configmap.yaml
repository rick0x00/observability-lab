apiVersion: v1
kind: ConfigMap
metadata:
  name: observability-app-config
  namespace: app
  labels:
    app: observability-app
    environment: staging
    component: app
data:
  # APP_ENV is injected into logs by the shim and patches here per overlay
  APP_ENV: "staging"
  PORT: "8080"
  PODINFO_PORT: "9898"
  SLOW_SECONDS: "2"
