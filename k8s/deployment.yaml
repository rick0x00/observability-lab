apiVersion: apps/v1
kind: Deployment
metadata:
  name: observability-app
  namespace: app
  labels:
    app: observability-app
    environment: staging
    component: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: observability-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: observability-app
        environment: staging
        component: app
      annotations:
        # prometheus scrape - port matches shim, not podinfo native port
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: observability-app
          image: docker.io/rick0x00/observability-lab:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: observability-app-config

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

          # shim maps /health -> /healthz and /ready -> /readyz
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 100
            runAsGroup: 101
            capabilities:
              drop: ["ALL"]
