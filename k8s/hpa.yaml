apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: observability-app-hpa
  namespace: app
  labels:
    app: observability-app
    environment: staging
    component: app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: observability-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 71
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 76

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      # slow scale-down to avoid flapping
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
