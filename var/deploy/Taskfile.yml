version: "3"

# deploy everything at once, wrappers around k8s + monitoring + elk tasks
vars:
  SCRIPTS_DIR: var/scripts
  REGISTRY: '{{.DOCKERHUB_USER | default (env "DOCKERHUB_USER") | default "rick0x00"}}'
  IMAGE_NAME: observability-lab
  IMAGE_TAG: '{{.IMAGE_TAG | default (env "IMAGE_TAG") | default "latest"}}'
  IMAGE_FULL_INPUT: '{{.IMAGE_FULL | default (env "IMAGE_FULL")}}'
  IMAGE_FULL: '{{.IMAGE_FULL_INPUT | default (printf "%s/%s:%s" .REGISTRY .IMAGE_NAME .IMAGE_TAG)}}'
  KUBE_CONTEXT_INPUT: '{{.KUBE_CONTEXT | default (env "KUBE_CONTEXT")}}'

tasks:
  default:
    silent: true
    cmds:
      - task --list-all -t "{{.TASKFILE}}"

  all:
    desc: Deploy app + monitoring + ELK in order (ENV required)
    preconditions:
      - sh: '[ -n "{{.ENV}}" ]'
        msg: "ENV is required -- usage: task deploy:all ENV=dev [KUBE_CONTEXT=default]"
    cmds:
      - task: :k8s:apply
        vars:
          ENV: "{{.ENV}}"
          KUBE_CONTEXT: "{{.KUBE_CONTEXT_INPUT}}"
          REGISTRY: "{{.REGISTRY}}"
          IMAGE_NAME: "{{.IMAGE_NAME}}"
          IMAGE_TAG: "{{.IMAGE_TAG}}"
          IMAGE_FULL: "{{.IMAGE_FULL}}"
      - task: :monitoring:apply
        vars:
          ENV: "{{.ENV}}"
          KUBE_CONTEXT: "{{.KUBE_CONTEXT_INPUT}}"
      - task: :elk:apply
        vars:
          ENV: "{{.ENV}}"
          KUBE_CONTEXT: "{{.KUBE_CONTEXT_INPUT}}"

  status:
    desc: Show app + monitoring + ELK status (ENV required)
    preconditions:
      - sh: '[ -n "{{.ENV}}" ]'
        msg: "ENV is required -- usage: task deploy:status ENV=dev [KUBE_CONTEXT=default]"
    cmds:
      - task: :k8s:status
        vars:
          ENV: "{{.ENV}}"
          KUBE_CONTEXT: "{{.KUBE_CONTEXT_INPUT}}"
      - task: :monitoring:status
        vars:
          ENV: "{{.ENV}}"
          KUBE_CONTEXT: "{{.KUBE_CONTEXT_INPUT}}"
      - task: :elk:status
        vars:
          ENV: "{{.ENV}}"
          KUBE_CONTEXT: "{{.KUBE_CONTEXT_INPUT}}"

  image-build:
    desc: Build image (IMAGE_TAG={{.IMAGE_TAG}})
    cmds:
      - |
        docker build --build-arg PORT=8080 --tag {{.IMAGE_FULL}} --tag {{.REGISTRY}}/{{.IMAGE_NAME}}:latest --label "org.opencontainers.image.revision=$(git rev-parse --short HEAD 2>/dev/null || echo unknown)" --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" .

  image-push:
    desc: Push image to Docker Hub
    cmds:
      - DOCKERHUB_USER={{.REGISTRY}} bash ci/scripts/dockerhub-login.sh "{{.REGISTRY}}"
      - docker push {{.IMAGE_FULL}}
      - docker push {{.REGISTRY}}/{{.IMAGE_NAME}}:latest
